<!DOCTYPE html>
<html lang="it" class="h-100" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>uni(S)UD - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <style>
      html, body {
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background-color: #212529;
        text-align: center;
      }
      .cover-container {
        max-width: 42em;
      }
      form input {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body class="d-flex h-100 text-center text-bg-dark">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
      <header class="mb-auto">
        <div>
          <h3 class="float-md-start mb-0">Dashboard UniSUd</h3>
          <nav class="nav nav-masthead justify-content-center float-md-end">
            <a class="nav-link fw-bold py-1 px-0 active" href="/">Home</a>
            <a class="nav-link fw-bold py-1 px-0" href="/upload">Upload</a>
            <a class="nav-link fw-bold py-1 px-0" href="/dashboard">Dashboard</a>
          </nav>
        </div>
      </header>

      <main class="px-3">
        <h1>Benvenuto!</h1>
        <p class="lead">Effettua il login per accedere alla dashboard</p>

        <!-- 🔹 FORM DI LOGIN -->
        <form method="POST" action="/">
          {% if error %}
          <div class="alert alert-danger py-2">{{ error }}</div>
          {% endif %}

          <div class="form-floating mb-2">
            <input
              type="text"
              class="form-control"
              id="email"
              name="email"
              placeholder="Email"
              required
            >
            <label for="email">Email</label>
          </div>

          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Password"
              required
            >
            <label for="password">Password</label>
          </div>

          <button class="btn btn-lg btn-light fw-bold border-white bg-white" type="submit">
            Accedi
          </button>
        </form>
      </main>

      <footer class="mt-auto text-white-50">
        <p>Template “Cover” adattato per Flask – Bootstrap 5.3</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
