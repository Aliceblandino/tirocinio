<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Statistiche Globali</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Statistiche globali degli appelli</h2>

    <!-- MEDIA TOTALE -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Media complessiva dei voti</h5>

            {% if graph_media %}
                <div id="media-chart" style="height: 400px;"></div>
                <script>
                    var mediaGraph = {{ graph_media | safe }};
                    Plotly.newPlot(
                        'media-chart',
                        mediaGraph.data,
                        mediaGraph.layout
                    );
                </script>
            {% else %}
                <p class="text-muted">Nessun dato disponibile</p>
            {% endif %}
        </div>
    </div>

    <!-- BOXPLOT PER APPELLO -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Distribuzione voti per appello</h5>

            {% if graph_box %}
                <div id="boxplot-chart" style="height: 500px;"></div>
                <script>
                    var boxGraph = {{ graph_box | safe }};
                    Plotly.newPlot(
                        'boxplot-chart',
                        boxGraph.data,
                        boxGraph.layout
                    );
                </script>
            {% else %}
                <p class="text-muted">Nessun dato disponibile</p>
            {% endif %}
        </div>
    </div>

    <!-- TORNA ALLA DASHBOARD -->
    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary w-100 mb-4">
       Torna alla dashboard
    </a>

</div>
</body>
</html>
