<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Statistiche Globali</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        .grafico {
            min-height: 350px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        .card label {
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Statistiche globali degli appelli</h2>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-4">← Torna alla dashboard</a>

    <!-- ============================
         CARD FILTRI
         ============================ -->
    <div class="card p-3 mb-4 shadow-sm">

        <h5 class="mb-3">Statistiche</h5>

        <div class="row">
            <div class="col-md-6">
                <label><input type="checkbox" class="tema-check" name="stats" value="ripetizioni" checked> Ripetizioni</label><br>
                <label><input type="checkbox" class="tema-check" name="stats" value="genere" checked> Genere</label><br>
                <label><input type="checkbox" class="tema-check" name="stats" value="voti" checked> Voti</label><br>
            </div>

            <div class="col-md-6">
                <label><input type="checkbox" class="tema-check" name="stats" value="boxplot" checked> Boxplot</label><br>
                <label><input type="checkbox" class="tema-check" name="stats" value="media" checked> Media</label><br>
                <label><input type="checkbox" class="tema-check" name="stats" value="esiti" checked> Esiti</label><br>
                <label><input type="checkbox" class="tema-check" name="stats" value="cumulativa" checked> Cumulativa</label><br>
            </div>
        </div>

        <h5 class="mt-4">Appelli</h5>

        <div class="row">
            {% for a in appelli %}
            <div class="col-md-6">
                <label>
                    <input type="checkbox" name="appelli" value="{{ a.id }}" checked>
                    {{ a.header.data }} – {{ a.header.attivita }} - {{ a.header.data_appello }}
                </label>
            </div>
            {% endfor %}
        </div>

    </div>

    <!-- MESSAGGIO SE NESSUN APPELLO -->
    <div id="no-appelli" class="alert alert-warning mt-3" style="display:none;">
        Nessun appello selezionato. Seleziona almeno un appello per visualizzare le statistiche.
    </div>

    <!-- ============================
         GRIGLIA GRAFICI
         ============================ -->
    <h5 class="mt-4">Tutti i grafici</h5>

    <div class="row g-4 mt-3">

        <div class="col-md-6">
            <div id="g-boxplot" class="grafico" data-theme="boxplot"></div>
        </div>

        <div class="col-md-6">
            <div id="g-media" class="grafico" data-theme="media"></div>
        </div>

        <div class="col-md-6">
            <div id="g-esiti" class="grafico" data-theme="esiti"></div>
        </div>

        <div class="col-md-6">
            <div id="g-dvoti" class="grafico" data-theme="voti"></div>
        </div>

        <div class="col-md-6">
            <div id="g-genere" class="grafico" data-theme="genere"></div>
        </div>

        <div class="col-md-6">
            <div id="g-ripetizioni" class="grafico" data-theme="ripetizioni"></div>
        </div>

        <div class="col-md-6">
            <div id="g-cumulativa" class="grafico" data-theme="cumulativa"></div>
        </div>

    </div>

    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary w-100 mb-4 mt-4">
       Torna alla dashboard
    </a>

</div>

<!-- ============================
     SCRIPT AJAX + NORMALIZZAZIONE
     ============================ -->
<script>
// Raccoglie i filtri selezionati
function getSelectedFilters() {
    const stats = Array.from(document.querySelectorAll("input[name='stats']:checked"))
                       .map(c => c.value);

    const appelli = Array.from(document.querySelectorAll("input[name='appelli']:checked"))
                         .map(c => c.value);

    return { stats, appelli };
}

// Cancella un grafico
function clearPlot(id) {
    Plotly.purge(id);
    document.getElementById(id).innerHTML = "";
}

// Normalizza il formato del grafico
function normalizzaGrafico(raw) {
    if (!raw) return null;
    if (typeof raw === "object") return raw;
    if (typeof raw === "string") {
        try { return JSON.parse(raw); }
        catch (e) { return null; }
    }
    return null;
}

// Funzione principale AJAX
function aggiornaGrafici() {
    const filters = getSelectedFilters();

    // Se nessun appello selezionato → mostra messaggio e svuota grafici
    if (filters.appelli.length === 0) {
        document.getElementById("no-appelli").style.display = "block";

        ["g-boxplot","g-media","g-esiti","g-dvoti","g-genere","g-ripetizioni","g-cumulativa"]
            .forEach(clearPlot);

        return;
    } else {
        document.getElementById("no-appelli").style.display = "none";
    }

    fetch("/statistiche_globali_ajax", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(filters)
    })
    .then(r => r.json())
    .then(data => {

        const mapping = {
            "boxplot": "g-boxplot",
            "media": "g-media",
            "esiti": "g-esiti",
            "voti": "g-dvoti",
            "genere": "g-genere",
            "ripetizioni": "g-ripetizioni",
            "cumulativa": "g-cumulativa"
        };

        for (const key in mapping) {
            const divId = mapping[key];
            const obj = normalizzaGrafico(data[key]);

            if (obj && obj.data && obj.layout) {
                Plotly.newPlot(divId, obj.data, obj.layout);
            } else {
                clearPlot(divId);
            }
        }

        aggiornaVisibilitaTemi();
    });
}

// Mostra/nasconde grafici
function aggiornaVisibilitaTemi() {
    const selected = Array.from(document.querySelectorAll(".tema-check:checked"))
                          .map(c => c.value);

    document.querySelectorAll("[data-theme]").forEach(div => {
        const theme = div.getAttribute("data-theme");
        const col = div.closest(".col-md-6");  // la colonna Bootstrap

        if (selected.includes(theme)) {
            col.style.display = "block";
        } else {
            col.style.display = "none";
        }
    });
}


// Eventi
document.querySelectorAll("input[name='stats'], input[name='appelli']")
        .forEach(cb => cb.addEventListener("change", aggiornaGrafici));

window.addEventListener("load", aggiornaVisibilitaTemi);
window.addEventListener("load", aggiornaGrafici);
</script>

</body>
</html>
