<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Statistiche Globali</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Statistiche globali degli appelli</h2>

   <h5>Tutti i grafici</h5>
    {% if graph_box or graph_media_globale or graph_esiti or graph_distribuzione_voti %}
        <div>
                        <!-- <h5>Boxplot</h5> -->
                        <div id="g0"></div>

                        <!-- <h5>Media voti (solo valutati)</h5> -->
                        <!-- <div id="g1"></div> -->

                        <!-- <h5>Media voti (globale)</h5> -->
                        <div id="g2"></div>

                        <!-- <h5>Distribuzione esiti</h5> -->
                        <div id="g3"></div>
                        <!-- <h5>Distribuzione voti (solo sufficienti)</h5> -->
                        <div id="g4"></div>
                        <div id="g5"></div>
                        <div id="g6"></div>

                        <script>
                        Plotly.newPlot('g0', {{ graph_box | safe }}.data, {{ graph_box | safe }}.layout);
                        //  Plotly.newPlot('g1', {{ graph_media_solo | safe }}.data, {{ graph_media_solo | safe }}.layout);
                        Plotly.newPlot('g2', {{ graph_media_globale | safe }}.data, {{ graph_media_globale | safe }}.layout);
                        Plotly.newPlot('g3', {{ graph_esiti | safe }}.data, {{ graph_esiti | safe }}.layout);
                        Plotly.newPlot('g4', {{ graph_distribuzione_voti | safe }}.data, {{ graph_distribuzione_voti | safe }}.layout);
                        Plotly.newPlot('g5', {{ graph_cumulativa | safe }}.data, {{ graph_cumulativa | safe }}.layout);
                        Plotly.newPlot('g6', {{ graph_genere | safe }}.data, {{ graph_genere | safe }}.layout);
                        </script>
        {% endif %}            
                    </div>
    

    <!-- TORNA ALLA DASHBOARD -->
    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary w-100 mb-4">
       Torna alla dashboard
    </a>

</div>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
