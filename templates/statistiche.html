<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Statistiche Globali</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
<div class="container mt-4">
    <h2 class="mb-4">Statistiche globali degli appelli</h2>
    <form method="POST" action="/statistiche_globali">
        <h5>Statistiche</h5>
        <label><input type="checkbox" name="stats" value="ripetizioni" checked> Ripetizioni</label>
        <label><input type="checkbox" name="stats" value="genere" checked> Genere</label>
        <label><input type="checkbox" name="stats" value="voti" checked> Voti</label>
        <label><input type="checkbox" name="stats" value="boxplot"> Boxplot</label>
        <label><input type="checkbox" name="stats" value="media"> Media</label>
        <label><input type="checkbox" name="stats" value="esiti"> Esiti</label>

        <h5 class="mt-3">Appelli</h5>
        {% for a in appelli %}
            <label>
            <input type="checkbox" name="appelli" value="{{ a.id }}" checked>
            {{ a.header.data }} – {{ a.header.attivita }}
            </label><br>
        {% endfor %}

        <button type="submit" class="btn btn-primary mt-3">Aggiorna grafici</button>
    </form>

    <h5>Tutti i grafici</h5>
        <div>
            <div id="g-boxplot" data-theme="boxplot"></div>
            <div id="g-media" data-theme="media"></div>
            <div id="g-esiti" data-theme="esiti"></div>
            <div id="g-dvoti" data-theme="voti"></div>
            <div id="g-genere" data-theme="genere"></div>
            <div id="g-ripetizioni" data-theme="ripetizioni"></div>
            <div id="g-cumulativa" data-theme="cumulativa"></div>
                        
                        
                        
             <script>
                console.log("DEBUG: Inizio rendering grafici");

                console.log("graph_box:", {{ graph_box | tojson }});
                console.log("graph_media_globale:", {{ graph_media_globale | tojson }});
                console.log("graph_esiti:", {{ graph_esiti | tojson }});
                console.log("graph_distribuzione_voti:", {{ graph_distribuzione_voti | tojson }});
                console.log("graph_genere:", {{ graph_genere | tojson }});
                console.log("graph_ripetizioni:", {{ graph_ripetizioni | tojson }});
                console.log("graph_cumulativa:", {{ graph_cumulativa | tojson }});

                console.log("DIV trovati:", document.querySelectorAll("[data-theme]"));
                console.log("Checkbox temi:", document.querySelectorAll(".tema-check"));
                </script>
           
            <script>
                
                Plotly.newPlot('g-boxplot', {{ graph_box | safe }}.data, {{ graph_box | safe }}.layout);
                //Plotly.newPlot('g1', {{ graph_media_solo | safe }}.data, {{ graph_media_solo | safe }}.layout);
                Plotly.newPlot('g-media', {{ graph_media_globale | safe }}.data, {{ graph_media_globale | safe }}.layout);
                Plotly.newPlot('g-esiti', {{ graph_esiti | safe }}.data, {{ graph_esiti | safe }}.layout);
                Plotly.newPlot('g-dvoti', {{ graph_distribuzione_voti | safe }}.data, {{ graph_distribuzione_voti | safe }}.layout);
                Plotly.newPlot('g-cumulativa', {{ graph_cumulativa | safe }}.data, {{ graph_cumulativa | safe }}.layout);
                Plotly.newPlot('g-genere', {{ graph_genere | safe }}.data, {{ graph_genere | safe }}.layout);
                Plotly.newPlot('g-ripetizioni', {{ graph_ripetizioni | safe }}.data, {{ graph_ripetizioni | safe }}.layout);
                Plotly.newPlot('g-cumulativa', {{ graph_cumulativa | safe }}.data, {{ graph_cumulativa | safe }}.layout);


            </script>
            <script>
            document.querySelectorAll(".tema-check").forEach(check => {
                check.addEventListener("change", () => {
                    const selected = Array.from(document.querySelectorAll(".tema-check:checked"))
                                        .map(c => c.value);

                    document.querySelectorAll("[data-theme]").forEach(div => {
                        const theme = div.getAttribute("data-theme");
                        div.style.display = selected.includes(theme) ? "block" : "none";
                    });
                });
            });
            </script>         
        </div>
    

    <!-- TORNA ALLA DASHBOARD -->
    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary w-100 mb-4">
       Torna alla dashboard
    </a>

</div>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
