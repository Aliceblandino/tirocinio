<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Statistiche Globali</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
<div class="container mt-4">

    <h2 class="mb-4">Statistiche globali degli appelli</h2>

   <h5>Tutti i grafici</h5>
{% for grafico in session.grafici %}
    <div id="chart-{{ loop.index }}" style="height: 400px;"></div>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script>
        var g = {{ grafico|safe }};
        Plotly.newPlot('chart-{{ loop.index }}', g.data, g.layout);
    </script>
{% endfor %}

    <!-- TORNA ALLA DASHBOARD -->
    <a href="{{ url_for('dashboard') }}"
       class="btn btn-secondary w-100 mb-4">
       Torna alla dashboard
    </a>

</div>
</body>
</html>
