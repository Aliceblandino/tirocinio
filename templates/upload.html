<!DOCTYPE html>
<html lang="it" class="h-100" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Carica esame</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white text-center">
<div class="container mt-5">
  <h2>Carica un nuovo esame</h2>
  <form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required onchange="this.form.submit()">
  </form>
  <a href="/dashboard" class="btn btn-light mt-3">Torna alla dashboard</a>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-warning mt-2">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>
</body>
</html>
