<!DOCTYPE html>
<html lang="it" class="h-100" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carica esame - UniUd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #212529;
            color: #fff;
        }
        .upload-box {
            border: 2px dashed #6c757d;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            background-color: #343a40;
        }
        .upload-box:hover {
            border-color: #0d6efd;
        }
        .upload-icon {
            font-size: 48px;
            color: #0d6efd;
        }
        input[type="file"] {
            display: none;
        }
        label[for="file"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="upload-box">
        <h2 class="mb-3">Carica un nuovo esame</h2>
        <p class="mb-4">Trascina qui i tuoi esami o clicca <strong>+</strong> per aggiungerli</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-warning">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/upload" enctype="multipart/form-data">
            <label for="file">
                <div class="upload-icon">+</div>
            </label>
            <input type="file" id="file" name="file" accept=".csv,.xls,.xlsx" required onchange="this.form.submit()">
        </form>

        <a href="/dashboard" class="btn btn-light mt-4 w-100">Torna alla dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
