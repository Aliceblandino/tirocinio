
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Appello - {{ appello.header.attivita }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div class="card mt-3 fade-slide-in" id="card-dettaglio">
    <div class="card-body">
        <h4>{{ appello.header.attivita }}</h4>
        <p><b>Data appello:</b> {{ appello.header.data_appello }}</p>
        <p><b>Tipo di prova:</b> {{ appello.header.tipo_prova }}</p>
        <p><b>Iscritti:</b> {{ appello.header.totale_iscritti }}</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3">← Torna alla dashboard</a>
    </div>
</div>

    <!-- QUI IN FUTURO AGGIUNGEREMO I GRAFICI -->
<div class="container mt-4">
    <div class="row">

        <div class="col-md-6">
            <h5>Distribuzione voti</h5>
            <div id="grafico-distribuzione"></div>
        </div>

        <div class="col-md-6">
            <h5>Boxplot</h5>
            <div id="grafico-boxplot"></div>
        </div>

        <div class="col-md-6 mt-4">
            <h5>Media</h5>
            <div id="grafico-media"></div>
        </div>

    </div>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
    const graficoDistribuzione = {{ grafico_distribuzione | tojson }};
    Plotly.newPlot('grafico-distribuzione', graficoDistribuzione.data, graficoDistribuzione.layout);

    const graficoBoxplot = {{ grafico_boxplot | tojson }};
    Plotly.newPlot('grafico-boxplot', graficoBoxplot.data, graficoBoxplot.layout);

    const graficoMedia = {{ grafico_media | tojson }};
    Plotly.newPlot('grafico-media', graficoMedia.data, graficoMedia.layout);
</script>

</div>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
